- name: Deploy TSP EEG classification package
  hosts: staging
  become: true
  gather_facts: true

  vars:
    app_user: tsp
    app_dir: /opt/tsp
    venv_dir: /opt/tsp/venv
    artifact_dir_env: "{{ lookup('env', 'ARTIFACT_DIR') }}"
    artifact_dir: "{{ artifact_dir_env if artifact_dir_env else playbook_dir ~ '/../dist' }}"
    artifact_candidates: "{{ lookup('ansible.builtin.fileglob', artifact_dir ~ '/*.whl', wantlist=True) | sort }}"
    artifact_file: "{{ artifact_candidates | last }}"
    remote_wheel: "{{ app_dir }}/app/{{ artifact_file | basename }}"
    package_name: tsp-eeg-classification

  pre_tasks:
    - name: Ensure a wheel artifact exists locally
      ansible.builtin.assert:
        that:
          - artifact_candidates | length > 0
        fail_msg: "No .whl artifact found. Put the CI artifact into {{ artifact_dir }}/ or set ARTIFACT_DIR."

  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        update_cache: true
        state: present

    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create application directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/app"
        - "{{ app_dir }}/config"
        - "{{ app_dir }}/logs"

    - name: Create Python virtual environment
      ansible.builtin.command: "python3 -m venv {{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/python"

    - name: Copy wheel artifact to server
      ansible.builtin.copy:
        src: "{{ artifact_file }}"
        dest: "{{ remote_wheel }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Upgrade pip in virtual environment
      ansible.builtin.command: "{{ venv_dir }}/bin/python -m pip install --upgrade pip"
      changed_when: false

    - name: Install application artifact
      ansible.builtin.command: "{{ venv_dir }}/bin/python -m pip install --force-reinstall {{ remote_wheel }}"
      register: install_result
      changed_when: "'Successfully installed' in install_result.stdout"

    - name: Verify installed package
      ansible.builtin.command: "{{ venv_dir }}/bin/python -c \"import importlib.metadata as m; print(m.version('{{ package_name }}'))\""
      changed_when: false
