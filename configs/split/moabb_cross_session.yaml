# MOABB Cross-session splitting strategy.
backend: moabb_cross_session

# Whether the cross-session splitting strategy is enabled.
enabled: true

# Global validation settings - if pre_split_validation is true, a portion of the data will be set aside for validation before applying the MOABB splitting strategy.
pre_split_validation: true
# Fraction of data to use for global validation (0.0 to 1.0).
validation_ratio: 0.0

# Evaluator configuration for the MOABB cross-session splitting strategy.
evaluator:
  # MOABB target splitter class.
  _target_: moabb.evaluations.CrossSessionSplitter
  
  # Scikit-learn cross-validation class to use internally.
  cv_class: sklearn.model_selection.LeaveOneGroupOut
  
  # Whether to shuffle groups before splitting.
  # Note: This depends on the cv_class used. Shuffle is NOT compatible with LeaveOneGroupOut.
  shuffle: false
  
  # Random seed for reproducible splits (if shuffle is true).
  random_state: 42

