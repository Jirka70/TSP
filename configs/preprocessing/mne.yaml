# Preprocessing configuration using the MNE backend.

# Backend identifier used to select the preprocessing implementation.
backend: mne

# Low cutoff frequency for band-pass filtering.
# Set to null to disable the low cutoff.
l_freq: 8.0

# High cutoff frequency for band-pass filtering.
# Set to null to disable the high cutoff.
h_freq: 30.0

# Frequency used for notch filtering to suppress line noise.
# Example: 50 Hz in Europe, 60 Hz in the US.
# Set to null to disable notch filtering.
notch_freq: 50.0

# Target sampling frequency after resampling.
# Set to null to keep the original sampling rate.
# e.g. 128Hz
sampling_rate_hz: 128.0

# EEG rereferencing strategy.
# Common examples:
# - average (reference is average of all EEG channels)
# - Cz (reference is concrete electrode "Cz")
# - mastoids (reference is electrode behind patient's ear)
# Set to null to skip rereferencing.
rereference: average

# Explicit channel selection.
# Use null to keep all available channels.
channel_selection: null

# Whether bad channels detected earlier should be dropped.
drop_bad_channels: false

# Optional artifact handling policy.
# Example values:
# - null
# - reject_annotations
# - simple_threshold
artifact_policy: null

stage: impl.preprocessing.dummy_preprocessing.DummyPreprocessing