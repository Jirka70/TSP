# Dataset-specific configuration for the EEGBCI / PhysioNet motor imagery dataset.

backend: eegbci
# Unique dataset identifier used by the pipeline.
name: BNCI2014_001

# Root path where the dataset is stored locally.
path: ./data/eegbci

# Subject IDs to include in the experiment.
subject_ids:
  - 1

# Session IDs to load.
# Use null to load all available sessions.
session_ids: null

# Run IDs to load.
# Example: EEGBCI motor imagery commonly uses runs 4, 8, and 12.
run_ids:
  - 4
  - 8
  - 12

