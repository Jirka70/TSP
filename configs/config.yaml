# Root experiment configuration.
# This file composes the full experiment config from smaller config groups.

defaults:
  # Select one dataset configuration.
  - dataset: eegbci

  # Select one preprocessing backend/configuration.
  - preprocessing: mne

  # Select one augmentation configuration.
  - augmentation: none

  # Select one model configuration.
  - model: eegnet

  # Select one evaluation configuration.
  - evaluation: default

  # Keep Hydra's own defaults behavior.
  - _self_

# Global reproducibility and run-level settings.
reproducibility:
  # Random seed used across the whole experiment.
  seed: 42

  # Directory where experiment outputs will be stored.
  output_dir: ./outputs

# Optional metadata for experiment tracking.
experiment:
  # Human-readable experiment name.
  name: eeg_motor_imagery_baseline

  # Free-form description for logs or reports.
  description: Baseline EEG motor imagery experiment with MNE preprocessing and EEGNet model.