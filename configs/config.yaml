dataset:
  name: eegbci
  path: ./data/eegbci
  subject_ids: [1]
  session_ids: null
  run_ids: [4, 8, 12]
  task: mi

preprocessing:
  backend: mne
  l_freq: 8.0
  h_freq: 30.0
  notch_freq: 50.0
  target_sfreq: 128
  rereference: average
  channel_selection: null

augmentation:
  enabled: false
  backend: null

model:
  backend: eegnet
  n_classes: 2

evaluation:
  metrics:
    - accuracy
    - f1_macro

visualization:
  backend: matplotlib
  save_confusion_matrix: true
  save_training_curve: true

reproducibility:
  seed: 69
  output_dir: ./outputs