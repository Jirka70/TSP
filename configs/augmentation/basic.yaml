# Basic augmentation configuration for EEG samples.

enabled: true

# Backend identifier used to select augmentation implementation.
backend: basic

# Number of augmented variants generated per original sample.
copies_per_sample: 2

# Standard deviation of Gaussian noise added to the signal.
gaussian_noise_std: 0.01

# Maximum temporal shift applied to each sample, expressed in samples.
max_time_shift: 10

# Probability of dropping a channel during augmentation.
channel_dropout_prob: 0.0