backend: "sklearn"           # Scikit-learn backend using Riemannian geometry-based features

# --- Model Configuration ---

# Support Vector Machine (SVM) classifier operating on the Riemannian tangent space.

model_name: "riemannian_svm" # Unique identifier for the Riemannian SVM pipeline
fold_training: false         # Toggle between single-shot training and cross-validation fold training

parameters:
  estimator: "oas"           # Ensures stable covariance matrix estimation
  metric: "riemann"          # Projection metric for the covariance manifold
  kernel: "linear"           # SVM kernel type; linear is often preferred for high-dimensional tangent space