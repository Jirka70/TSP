backend: "sklearn"           # Scikit-learn backend for classical machine learning pipelines

# --- Model Configuration ---

# Combines Common Spatial Patterns (CSP) for dimensionality reduction and Linear Discriminant Analysis (LDA).

model_name: "csp_lda"        # Unique identifier for the CSP + LDA pipeline
fold_training: false         # Toggle between single-shot training and cross-validation fold training

parameters:
  n_components: 4            # Number of spatial filters to extract (typically 4-6 for motor imagery)