backend: "sklearn"           # Scikit-learn backend using Riemannian geometry-based features

# --- Model Configuration ---

# Uses covariance matrices projected into tangent space, classified by Linear Discriminant Analysis.

model_name: "riemannian_lda" # Unique identifier for the Riemannian LDA pipeline
fold_training: false         # Toggle between single-shot training and cross-validation fold training

parameters:
  estimator: "oas"           # Oracle Approximating Shrinkage: robust covariance estimation for small samples
  metric: "riemann"          # Geometric metric used to calculate the distance/mean in the manifold