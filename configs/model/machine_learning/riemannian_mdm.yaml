backend: "sklearn"           # Scikit-learn backend using Riemannian geometry-based features

# --- Model Configuration ---

# Minimum Distance to Mean (MDM): classifies trials based on the nearest class centroid in the manifold.

model_name: "riemannian_mdm" # Unique identifier for the Riemannian MDM classifier
fold_training: false         # Toggle between single-shot training and cross-validation fold training

parameters:
  estimator: "oas"           # Shrinkage estimator to ensure positive-definite covariance matrices
  metric: "riemann"          # The Affine-Invariant Riemannian Metric used for distance calculation