backend: "sklearn"           # Scikit-learn backend using Riemannian geometry-based features

# --- Model Configuration ---

# Random Forest ensemble applied to the vectorized tangent space features.

model_name: "riemannian_rf"  # Unique identifier for the Riemannian Random Forest pipeline
fold_training: false         # Toggle between single-shot training and cross-validation fold training

parameters:
  estimator: "oas"           # Robust covariance estimation method
  metric: "riemann"          # Manifold metric for feature extraction
  n_estimators: 100          # Number of decision trees in the forest