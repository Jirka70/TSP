name: "CI"

on:
  push:
    branches:
      - "feature/TMSPKED-380-CICD-Implement-CICD-Pipeline"
  pull_request:
    branches:
      - "feature/TMSPKED-380-CICD-Implement-CICD-Pipeline"

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff build

      - name: Static analysis
        run: |
          ruff check .
      
      - name: Run tests
        run: |
          pytest

      - name: Build package
        run: | 
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Build Docker image
        run: |
          docker build \
            -t tsp-eeg-classification:${{ github.sha }} \
            -t tsp-eeg-classification:latest \
            .

      - name: Smoke test Docker image
        run: |
          docker run --rm tsp-eeg-classification:${{ github.sha }}

      - name: Save Docker image
        run: |
          docker save \
            tsp-eeg-classification:${{ github.sha }} \
            tsp-eeg-classification:latest \
            -o tsp-eeg-classification-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: tsp-eeg-classification-image.tar



      
    
      
