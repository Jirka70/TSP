name: "CI"

on:
  push:
    branches:
      - "feature/TMSPKED-380-CICD-Implement-CICD-Pipeline"
  pull_request:
    branches:
      - "feature/TMSPKED-380-CICD-Implement-CICD-Pipeline"

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff build

      - name: Static analysis
        run: |
          ruff check .
      
      - name: Run tests
        run: |
          pytest

      - name: Build package
        run: | 
          python -m build
      
    
      